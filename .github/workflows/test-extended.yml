name: Extended Tests

on:
  schedule:
    - cron: '0 2 * * 0'  # Weekly on Sunday at 2 AM UTC
  workflow_dispatch:       # Allow manual trigger

jobs:
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov

      - name: Run integration tests
        run: pytest tests/integration/ -v --cov=tools --cov-report=xml

      - name: Upload coverage
        uses: actions/upload-artifact@v3
        with:
          name: integration-coverage
          path: coverage.xml

  performance:
    name: Performance Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run performance tests
        run: pytest tests/performance/ -v -m performance --tb=short

  security:
    name: Security Hardening Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run security tests
        run: pytest tests/security/ -v --tb=short

      - name: Upload security test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: security-test-results
          path: .pytest_cache/

  full-suite:
    name: Full Test Suite
    runs-on: ubuntu-latest
    needs: [integration, performance, security]
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov

      - name: Run all tests with coverage
        run: pytest tests/ -v --cov=tools --cov-report=html --cov-report=xml

      - name: Upload full coverage report
        uses: actions/upload-artifact@v3
        with:
          name: full-coverage-report
          path: htmlcov/
