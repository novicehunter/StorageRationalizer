name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          # Install only non-macOS-specific deps
          pip install flask requests google-auth google-api-python-client msal cryptography rich || true

      - name: Run unit tests
        run: |
          pytest tests/ -m "unit or integration" \
            --cov=phase1 --cov=phase2 --cov=phase3 --cov=tools \
            --cov-report=term-missing \
            --cov-report=xml \
            -v

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  lint:
    name: Lint & format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install lint tools
        run: pip install black flake8

      - name: Black format check
        run: black --check --diff .

      - name: Flake8
        run: flake8 . --max-line-length=120 --ignore=E203,W503 --exclude=credentials,manifests,reports,logs,.git
